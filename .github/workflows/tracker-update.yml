# ARCHIVED: This workflow is disabled. The project was retired on 2026-04-13.
# It previously ran hourly to fetch Artemis II mission updates via Google Gemini AI.
name: Tracker Update
on:
  # Triggers removed — workflow archived
  # Previously: schedule (hourly cron) and workflow_dispatch
  workflow_dispatch: # kept for reference but repo will be archived/read-only

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Fetch Updates
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/fetch-updates.js
      - name: Run Validation Tests
        run: npm test -- --run
      - name: Final Data Validation
        run: node scripts/validate-data.js
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update tracker data" && git push)
